name: 'dbt_training'
version: '1.0.0'
config-version: 2

profile: 'dbt_training'

model-paths: ["models"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
test-paths: ["tests"]
analysis-paths: ["analyses"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  dbt_training:
    1_staging:
      +materialized: view
      # +alias makes the database object name singular while keeping the file name plural.
      # ref('stg_hubspot__contacts') still works — ref() uses the file/node name, not the alias.
      stg_hubspot__contacts:
        +alias: stg_hubspot__contact
      stg_hubspot__deals:
        +alias: stg_hubspot__deal
      stg_hubspot__owners:
        +alias: stg_hubspot__owner
      stg_hubspot__pipeline_stages:
        +alias: stg_hubspot__pipeline_stage
      stg_prescriptions:
        +alias: stg_prescription
      stg_products:
        +alias: stg_product
    2_silver:
      +materialized: table
    3_gold:
      +materialized: table
      mrt_patient_prescriptions:
        +alias: mrt_patient_prescription

seeds:
  dbt_training:
    # ── Raw transactional seeds land in hubspot_raw schema ──────────────────
    # For DuckDB testing: seeds simulate the Snowflake pre-loaded Bronze tables.
    # For Snowflake training: these CSVs are pre-loaded by the trainer; participants
    # do NOT run dbt seed for these — the trainer_guide explains the setup.
    raw_contacts:
      +schema: hubspot_raw
      +alias: contacts      # DuckDB testing: seed lands as 'contacts' matching source name
      +column_types:
        id: integer
        pipeline_stage_id: integer
        _loaded_at: timestamp
    raw_pipeline_stages:
      +schema: hubspot_raw
      +alias: pipeline_stages
      +column_types:
        stage_id: integer
        pipeline_id: integer
        sort_order: integer
        probability: double
        is_closed: boolean
        _loaded_at: timestamp
    raw_deals:
      +schema: hubspot_raw
      +alias: deals
      +column_types:
        deal_id: integer
        contact_id: integer
        stage_id: integer
        amount: double
        _loaded_at: timestamp
    raw_products:
      +schema: hubspot_raw
      +alias: products
      +column_types:
        product_id: integer
        price: double
        _loaded_at: timestamp
    raw_prescriptions:
      +schema: hubspot_raw
      +alias: prescriptions
      +column_types:
        prescription_id: integer
        contact_id: integer
        owner_id: integer
        product_id: integer
        quantity: integer
        _loaded_at: timestamp
    raw_owners:
      +schema: hubspot_raw
      +alias: owners
      +column_types:
        owner_id: integer
        _loaded_at: timestamp

    # ── Lookup seeds — participants load these with dbt seed in Module 08 ─────
    country_codes:
      +column_types:
        country_code: varchar
    product_categories:
      +column_types:
        is_prescription_required: boolean

vars:
  min_deal_amount: 0
  start_date: '2024-01-01'
