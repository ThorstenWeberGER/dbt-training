version: 2

models:
  - name: dim_patient
    description: "Patient dimension. Grain: one row per patient (HubSpot contact). SCD1."
    columns:
      - name: patient_key
        description: "Surrogate key — MD5 of contact_id"
        tests:
          - not_null
          - unique
      - name: contact_id
        tests:
          - not_null
          - unique
      - name: email
        tests:
          - not_null
      - name: country_code
        description: "ISO 2-letter country code (upper-cased in staging)"

  - name: dim_doctor
    description: "Doctor dimension. Grain: one row per doctor (HubSpot owner). SCD1."
    columns:
      - name: doctor_key
        description: "Surrogate key — MD5 of owner_id"
        tests:
          - not_null
          - unique
      - name: doctor_id
        tests:
          - not_null
          - unique
        description: "Business key from HubSpot owners."
      - name: first_name
        description: "First name of the doctor."
      - name: last_name
        description: "Last name of the doctor."
      - name: email
        description: "Work email address of the doctor."
      - name: loaded_at
        description: "Timestamp when the record was loaded into staging."

  - name: dim_pipeline_stage
    description: "Pipeline stage dimension. Grain: one row per stage."
    columns:
      - name: pipeline_stage_key
        description: "Surrogate key — MD5 of pipeline_stage_id"
        tests:
          - not_null
          - unique
      - name: pipeline_stage_id
        tests:
          - not_null
          - unique

  - name: dim_product
    description: "Product dimension enriched with category labels. Grain: one row per product."
    columns:
      - name: product_key
        description: "Surrogate key — MD5 of product_id"
        tests:
          - not_null
          - unique
      - name: product_id
        tests:
          - not_null
          - unique

  - name: fct_deal
    description: "Deal facts. Grain: one row per deal."
    columns:
      - name: deal_key
        description: "Surrogate key — MD5 of deal_id"
        tests:
          - not_null
          - unique
      - name: deal_id
        tests:
          - not_null
          - unique
      - name: patient_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_patient')
                field: patient_key
      - name: pipeline_stage_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_pipeline_stage')
                field: pipeline_stage_key

  - name: fct_prescription
    description: >
      Grain: one row per prescription record. Each row represents a single
      medication dispensing event linked to a patient and a prescribing doctor.
      Used by the Gold layer to compute prescription volume and fill rates.
    columns:
      - name: prescription_key
        description: "Surrogate primary key — MD5 hash of prescription_id."
        tests:
          - unique:
              config:
                severity: error
          - not_null:
              config:
                severity: error

      - name: patient_key
        description: "Foreign key to dim_patient. Identifies the patient receiving the prescription."
        tests:
          - not_null:
              config:
                severity: error
          - relationships:
              to: ref('dim_patient')
              field: patient_key
              config:
                severity: error

      - name: doctor_key
        description: "Foreign key to dim_doctor. Identifies the prescribing doctor."
        tests:
          - not_null:
              config:
                severity: error
          - relationships:
              to: ref('dim_doctor')
              field: doctor_key
              config:
                severity: error

      - name: prescription_date
        description: "Date the prescription was issued by the doctor."
        tests:
          - not_null:
              config:
                severity: error

      - name: medication_type
        description: "Delivery form of the medication."
        tests:
          - accepted_values:
              values: [tablet, liquid, injection, topical]
              config:
                severity: error

      - name: dosage_amount
        description: >
          Prescribed dose quantity. Null when the dose has not yet been confirmed
          by the prescribing doctor — this is an expected state for new records.
        tests:
          - not_null:
              config:
                severity: warn

      - name: notes
        description: "Optional free-text clinical notes added by the doctor."
