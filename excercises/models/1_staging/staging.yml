version: 2

models:
  - name: stg_hubspot__contacts
    description: "Staging layer for HubSpot contacts. One row per contact."
    alias: stg_hubspot__contact
    columns:
      - name: contact_id
        description: "Source system contact ID (renamed from id)"
        tests:
          - not_null
          - unique
      - name: email
        tests:
          - not_null
      - name: country_code
        tests:
          - not_null
      - name: loaded_at
        description: "Timestamp when this record was ingested (renamed from _loaded_at)"

  - name: stg_hubspot__pipeline_stages
    description: "Staging layer for HubSpot pipeline stages."
    alias: stg_hubspot__pipeline_stage
    columns:
      - name: pipeline_stage_id
        description: "Source system stage ID (renamed from stage_id)"
        tests:
          - not_null
          - unique
      - name: loaded_at
        description: "Timestamp when this record was ingested"

  - name: stg_hubspot__deals
    description: "Staging layer for HubSpot deals."
    alias: stg_hubspot__deal
    columns:
      - name: deal_id
        tests:
          - not_null
          - unique
      - name: loaded_at
        description: "Timestamp when this record was ingested"

  - name: stg_products
    description: "Staging layer for pharmacy products."
    alias: stg_product
    columns:
      - name: product_id
        tests:
          - not_null
          - unique

  - name: stg_prescriptions
    description: "Staging layer for prescriptions."
    alias: stg_prescription
    columns:
      - name: prescription_id
        tests:
          - not_null
          - unique
      - name: owner_id
        description: "FK to HubSpot owner (doctor) who issued the prescription"

  - name: stg_hubspot__owners
    description: "Staging layer for HubSpot owners (doctors). Added in Module 05."
    alias: stg_hubspot__owner
    columns:
      - name: owner_id
        description: "Source system owner ID"
        tests:
          - not_null
          - unique
      - name: loaded_at
        description: "Timestamp when this record was ingested"
      - name: first_name
        description: "Doctor's first name"
      - name: last_name
        description: "Doctor's last name"
      - name: email
        description: "Doctor's email address"
