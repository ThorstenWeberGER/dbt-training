# project name - must be unique across all dbt projects in the same database
name: 'dbt_training'            
version: '1.0.0'
config-version: 2

# profile MUST match the profile name in profiles.yml
profile: 'dbt_training'         

# default paths, can be changed or added to as needed
model-paths: ["models"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
test-paths: ["tests"]
analysis-paths: ["analyses"]

# default target path for compiled SQL and run results; can be changed but not required
target-path: "target"

# directories to be removed by dbt clean; can be changed or added to as needed
clean-targets: ["target", "dbt_packages"]

# default model configurations is set here to apply to all models in subfolders. overwritten by schema.yml in subfolders
models:
  # persist_docs enables dbt to store descriptions in Snowflake  making it accessible for tools that can read database metadata. 
  +persist_docs:
      relation: true
      column: true
  # must match project name - gives default namespace for models
  dbt_training:                 
    1_staging:
      +materialized: view
    2_silver:
      +materialized: table
    3_gold:
      +materialized: table
      mrt_patient_prescriptions:
      # +alias makes the database object name singular while keeping the file name plural.
      # ref('stg_hubspot__contacts') still works — ref() uses the file/node name, not the alias.
        +alias: mrt_patient_prescription

# Seeds are CSV files that dbt can load into the database. They are useful for static data, such as lookup tables or small datasets that don't change often. The configuration for seeds allows you to specify the schema, alias, and column types for each seed file. This ensures that the data is stored in the correct format in the database.
seeds:
  dbt_training:
    raw_contacts:
      +schema: hubspot_raw
      +alias: contacts
      +column_types:
        # column types definition makes sure that dbt stores data in required data type. Important especially for CSV files.
        id: integer
        pipeline_stage_id: integer
        _loaded_at: timestamp
    raw_pipeline_stages:
      +schema: hubspot_raw
      +alias: pipeline_stages
      +column_types:
        stage_id: integer
        pipeline_id: integer
        sort_order: integer
        probability: double
        is_closed: boolean
        _loaded_at: timestamp
    raw_deals:
      +schema: hubspot_raw
      +alias: deals
      +column_types:
        deal_id: integer
        contact_id: integer
        stage_id: integer
        amount: double
        _loaded_at: timestamp
    raw_products:
      +schema: hubspot_raw
      +alias: products
      +column_types:
        product_id: integer
        price: double
        _loaded_at: timestamp
    raw_prescriptions:
      +schema: hubspot_raw
      +alias: prescriptions
      +column_types:
        prescription_id: integer
        contact_id: integer
        owner_id: integer
        product_id: integer
        quantity: integer
        dosage_amount: double
        _loaded_at: timestamp
    raw_owners:
      +schema: hubspot_raw
      +alias: owners
      +column_types:
        owner_id: integer
        _loaded_at: timestamp

# Variables for jinja can be defined heare and referenced in models, seeds, etc. with {{ var('variable_name') }}. They can also be overridden at runtime with --vars or in the dbt Cloud UI.
vars:
  min_deal_amount: 0
  start_date: '2024-01-01'
