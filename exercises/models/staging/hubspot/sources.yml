version: 2

sources:
  - name: hubspot
    database: BRONZE
    schema: HUBSPOT
    description: Raw HubSpot data loaded by Lambda into the Bronze layer.

    tables:
      - name: contacts
        description: Every HubSpot contact record, append-only.

      - name: deals
        description: Every HubSpot deal record, append-only.

      - name: pipeline_stages
        description: HubSpot pipeline stage definitions.

      - name: prescriptions
        description: Prescription records linked to HubSpot contacts and owners.

      # participants add owners here in Module 05
