name: analytics
version: "1.0.0"
config-version: 2

profile: analytics

model-paths:    ["models"]
test-paths:     ["tests"]
seed-paths:     ["seeds"]
macro-paths:    ["macros"]
snapshot-paths: ["snapshots"]
analysis-paths: ["analyses"]

target-path:  "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  analytics:
    staging:
      +materialized: view

    silver:
      +materialized: table
      +database: SILVER_DEV   # hardcoded to training DB — Module 08 covers generate_database_name

    gold:
      +materialized: table
      +database: GOLD
