version: 2

sources:
  - name: hubspot
    database: dbt_training   # hardcoded to training DB — Module 08 covers generate_database_name
    schema: hubspot_data
    description: Raw HubSpot data loaded by Lambda into the Bronze layer.

    tables:
      - name: contacts
        description: Every HubSpot contact record, append-only. Grain is one contact per row.

      - name: deals
        description: Every HubSpot deal record, append-only. Grain is one deal per row.

      - name: pipeline_stages
        description: HubSpot pipeline stage definitions. Tickets move through pipelines and can have different statuses like 'new','open','closedwon','closedlost'.

      - name: prescriptions
        description: Prescription records linked to HubSpot contacts and owners. Grain is one prescription per row.

      # participants add owners here in Module 05
